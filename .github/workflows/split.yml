name: Split Monorepo

on:
  push:
    tags:
      - 'v*'

jobs:
  split:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          # Layer 0: Foundation
          - { local: 'packages/foundation', remote: 'foundation' }
          - { local: 'packages/cache', remote: 'cache' }
          - { local: 'packages/plugin', remote: 'plugin' }
          - { local: 'packages/typed-data', remote: 'typed-data' }
          - { local: 'packages/database-legacy', remote: 'database-legacy' }
          - { local: 'packages/testing', remote: 'testing' }
          - { local: 'packages/i18n', remote: 'i18n' }
          - { local: 'packages/queue', remote: 'queue' }
          - { local: 'packages/state', remote: 'state' }
          - { local: 'packages/validation', remote: 'validation' }
          # Layer 1: Core Data
          - { local: 'packages/entity', remote: 'entity' }
          - { local: 'packages/entity-storage', remote: 'entity-storage' }
          - { local: 'packages/access', remote: 'access' }
          - { local: 'packages/user', remote: 'user' }
          - { local: 'packages/config', remote: 'config' }
          - { local: 'packages/field', remote: 'field' }
          # Layer 2: Content Types
          - { local: 'packages/node', remote: 'node' }
          - { local: 'packages/taxonomy', remote: 'taxonomy' }
          - { local: 'packages/media', remote: 'media' }
          - { local: 'packages/path', remote: 'path' }
          - { local: 'packages/menu', remote: 'menu' }
          # Layer 3: Services
          - { local: 'packages/workflows', remote: 'workflows' }
          # Layer 4: API
          - { local: 'packages/api', remote: 'api' }
          - { local: 'packages/routing', remote: 'routing' }
          # Layer 5: AI
          - { local: 'packages/ai-schema', remote: 'ai-schema' }
          - { local: 'packages/ai-agent', remote: 'ai-agent' }
          - { local: 'packages/ai-pipeline', remote: 'ai-pipeline' }
          - { local: 'packages/ai-vector', remote: 'ai-vector' }
          # Layer 6: Interfaces
          - { local: 'packages/cli', remote: 'cli' }
          - { local: 'packages/mcp', remote: 'mcp' }
          - { local: 'packages/ssr', remote: 'ssr' }
          - { local: 'packages/telescope', remote: 'telescope' }
          # Meta-packages
          - { local: 'packages/cms', remote: 'cms' }
          - { local: 'packages/core', remote: 'core' }
          - { local: 'packages/full', remote: 'full' }
          - { local: 'packages/graphql', remote: 'graphql' }

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install splitsh-lite
        run: |
          curl -sL https://github.com/splitsh/lite/releases/download/v1.0.1/lite_linux_amd64.tar.gz | tar xz
          sudo mv splitsh-lite /usr/local/bin/splitsh-lite

      - name: Guard against unauthorized v1.0 tag
        if: startsWith(github.ref_name, 'v1.0')
        run: |
          if [ ! -f "release-approvals/v1.0.approved" ]; then
            echo "::error::UNAUTHORIZED_V1_TAG: Monorepo split aborted."
            echo "::error::A v1.0 tag was pushed without owner approval. See VERSIONING.md."
            exit 1
          fi
          echo "v1.0 approval artifact verified. Proceeding with split."

      - name: Verify split token
        env:
          SPLIT_GH_TOKEN: ${{ secrets.SPLIT_GITHUB_TOKEN }}
        run: |
          if [ -z "${SPLIT_GH_TOKEN}" ]; then
            echo "::error::SPLIT_GITHUB_TOKEN secret is empty or not set."
            exit 1
          fi
          echo "Token present (length: ${#SPLIT_GH_TOKEN})"

      - name: Split and push
        env:
          SPLIT_GH_TOKEN: ${{ secrets.SPLIT_GITHUB_TOKEN }}
          LOCAL_PREFIX: ${{ matrix.package.local }}
          REMOTE_REPO: ${{ matrix.package.remote }}
          REPO_OWNER: ${{ github.repository_owner }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git config --global "http.https://github.com/.extraheader" "Authorization: token ${SPLIT_GH_TOKEN}"
          REMOTE_URL="https://github.com/${REPO_OWNER}/${REMOTE_REPO}.git"
          SHA=$(splitsh-lite --prefix="${LOCAL_PREFIX}")
          git remote add split "${REMOTE_URL}" 2>/dev/null || true
          git push split "${SHA}:refs/heads/main" --force
          git push split "${SHA}:refs/tags/${TAG_NAME}" --force
