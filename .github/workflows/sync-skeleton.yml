name: Sync Application Skeleton

on:
  push:
    tags:
      - 'v*'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout framework
        uses: actions/checkout@v6
        with:
          path: framework

      - name: Checkout skeleton
        uses: actions/checkout@v6
        with:
          repository: waaseyaa/waaseyaa
          token: ${{ secrets.SPLIT_GITHUB_TOKEN }}
          path: skeleton

      - name: Sync skeleton files from monorepo
        run: |
          # Sync all files from framework/skeleton/ to the skeleton repo
          # Exclude .git and composer.lock (regenerated by users)
          rsync -av --delete \
            --exclude='.git' \
            --exclude='composer.lock' \
            framework/skeleton/ skeleton/

      - name: Update skeleton composer.json packages
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cd framework

          # Collect all package names from packages/*/composer.json
          PACKAGES=""
          for pkg in packages/*/composer.json; do
            NAME=$(python3 -c "import json; print(json.load(open('$pkg'))['name'])")
            PACKAGES="$PACKAGES $NAME"
          done

          cd ../skeleton

          # Build the require block dynamically
          python3 -c "
          import json, sys

          packages = '${PACKAGES}'.strip().split()
          with open('composer.json', 'r') as f:
              data = json.load(f)

          # Preserve php constraint and non-waaseyaa deps
          new_require = {}
          for key, val in data.get('require', {}).items():
              if not key.startswith('waaseyaa/'):
                  new_require[key] = val

          # Add all framework packages with ^major.minor from tag
          for pkg in sorted(packages):
              new_require[pkg] = '^0.1'

          data['require'] = dict(sorted(new_require.items()))

          with open('composer.json', 'w') as f:
              json.dump(data, f, indent=4)
              f.write('\n')
          "

      - name: Commit, tag, and push if changed
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cd skeleton
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No changes to skeleton"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: sync with framework ${TAG_NAME}"
          fi

          # Always tag to match the framework release
          git tag "${TAG_NAME}" -f
          git push origin main --tags --force
