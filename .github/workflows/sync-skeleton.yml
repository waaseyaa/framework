name: Sync Application Skeleton

on:
  push:
    tags:
      - 'v*'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout framework
        uses: actions/checkout@v6
        with:
          path: framework

      - name: Checkout skeleton
        uses: actions/checkout@v6
        with:
          repository: waaseyaa/waaseyaa
          token: ${{ secrets.SPLIT_GITHUB_TOKEN }}
          path: skeleton

      - name: Sync skeleton files from monorepo
        run: |
          # Sync all files from framework/skeleton/ to the skeleton repo
          # Exclude .git and composer.lock (regenerated by users)
          rsync -av --delete \
            --exclude='.git' \
            --exclude='composer.lock' \
            framework/skeleton/ skeleton/

      - name: Update skeleton composer.json packages
        run: |
          php framework/tools/sync-skeleton-requirements.php \
            framework/skeleton/composer.json \
            skeleton/composer.json

      - name: Commit, tag, and push if changed
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cd skeleton
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard)" ]; then
            echo "No changes to skeleton"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: sync with framework ${TAG_NAME}"
          fi

          # Always tag to match the framework release
          git tag "${TAG_NAME}" -f
          git push origin main --tags --force
