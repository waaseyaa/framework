name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  spec-drift:
    name: spec-drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for stale specs
        run: bash tools/drift-detector.sh 5

  ci-lint:
    name: ci/lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-v2-${{ hashFiles('composer.lock') }}
          restore-keys: composer-v2-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Validate composer.json
        run: composer validate

      - name: Check PHP syntax
        run: find packages/*/src -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run CS Fixer (dry-run)
        run: composer cs-check

      - name: Run PHPStan
        run: composer phpstan

  ci-unit-tests:
    name: ci/unit-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-v2-${{ hashFiles('composer.lock') }}
          restore-keys: composer-v2-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: ./vendor/bin/phpunit --testsuite Unit --log-junit build/logs/junit-unit.xml

      - name: Run integration tests
        run: ./vendor/bin/phpunit --testsuite Integration --log-junit build/logs/junit-integration.xml

      - name: Upload test artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: test-results
          path: |
            build/logs/junit-unit.xml
            build/logs/junit-integration.xml
            build/logs/clover.xml
          retention-days: 30

  ci-playwright-smoke:
    name: ci/playwright-smoke
    runs-on: ubuntu-latest
    needs: [frontend-build]
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-v2-${{ hashFiles('composer.lock') }}
          restore-keys: composer-v2-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/admin/package-lock.json

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: packages/admin/node_modules
          key: node-${{ hashFiles('packages/admin/package-lock.json') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('packages/admin/package-lock.json') }}

      - name: Install dependencies and Playwright
        run: cd packages/admin && npm install --no-audit --no-fund && npx playwright install --with-deps chromium firefox

      - name: Start PHP backend
        run: |
          php -S 127.0.0.1:8080 -t public/ > /tmp/php-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8080/ > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run Playwright smoke tests
        run: cd packages/admin && npx playwright test --project=chromium --project=firefox

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-smoke-results
          path: |
            packages/admin/test-results/
            packages/admin/playwright-report/
          retention-days: 30

      - name: Upload server logs on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: server-logs
          path: |
            /tmp/php-server.log
            /tmp/nuxt-server.log
          retention-days: 7

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/admin
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/admin/package-lock.json

      - name: Cache node modules
        uses: actions/cache@v5
        with:
          path: packages/admin/node_modules
          key: node-${{ hashFiles('packages/admin/package-lock.json') }}

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Admin SPA
        run: npm run build

      - name: Run frontend unit tests
        run: npm test

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: frontend-build
          path: packages/admin/.output/
          retention-days: 14

  manifest-conformance:
    name: Manifest conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate defaults manifests have project_versioning
        run: |
          fail=0
          for f in defaults/*.yaml; do
            if ! grep -q 'project_versioning' "$f"; then
              echo "FAIL: $f is missing project_versioning block"
              fail=1
            fi
          done
          exit $fail

      - name: Validate defaults JSON Schemas are well-formed
        run: |
          fail=0
          for f in defaults/*.schema.json; do
            if ! python3 -c "import json,sys; json.load(open('$f'))" 2>/dev/null; then
              echo "FAIL: $f is not valid JSON"
              fail=1
            fi
          done
          exit $fail

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install ajv-cli
        run: npm install -g ajv-cli

      - name: Validate defaults JSON Schemas are valid draft-07
        run: |
          fail=0
          for f in defaults/*.schema.json; do
            if ! ajv compile --spec=draft7 --strict=false -s "$f" > /dev/null 2>&1; then
              echo "FAIL: $f is not a valid JSON Schema draft-07"
              fail=1
            fi
          done
          exit $fail

  ingestion-defaults:
    name: Ingestion defaults
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate ingestion schema metadata and compatibility rules
        run: bash bin/check-ingestion-defaults

  security-defaults:
    name: Security defaults
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check no secrets in defaults/
        run: bash bin/check-no-secrets

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-v2-${{ hashFiles('composer.lock') }}
          restore-keys: composer-v2-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run structural secrets scan
        run: ./vendor/bin/phpunit --filter Phase22 --no-coverage
