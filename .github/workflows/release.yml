name: Release Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-pipeline
  cancel-in-progress: false

jobs:
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      deploy_sha: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Deploy to staging
        run: |
          if [ -f scripts/deploy.sh ]; then
            bash scripts/deploy.sh staging
          else
            echo "::warning::scripts/deploy.sh not found — recording metadata only"
          fi

      - name: Record deployment metadata
        run: |
          mkdir -p build/deploy
          jq -n \
            --arg env "staging" \
            --arg sha "${{ github.sha }}" \
            --arg ref "${{ github.ref }}" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg actor "${{ github.actor }}" \
            --arg run_id "${{ github.run_id }}" \
            '{environment: $env, sha: $sha, ref: $ref, timestamp: $ts, actor: $actor, run_id: $run_id}' \
            > build/deploy/staging-metadata.json

      - name: Upload deployment metadata
        uses: actions/upload-artifact@v6
        with:
          name: staging-deploy-metadata
          path: build/deploy/
          retention-days: 90

  playwright-full-sweep:
    name: Full Playwright sweep (staging)
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/admin/package-lock.json

      - name: Install dependencies and Playwright
        run: cd packages/admin && npm install --no-audit --no-fund && npx playwright install --with-deps chromium

      - name: Start PHP backend
        run: |
          php -S 127.0.0.1:8080 -t public/ > /tmp/php-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8080/ > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run full Playwright suite
        run: cd packages/admin && npx playwright test --project=chromium

      - name: Upload Playwright artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: playwright-full-sweep
          path: |
            packages/admin/test-results/
            packages/admin/playwright-report/
          retention-days: 90

      - name: Upload server logs on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: staging-server-logs
          path: |
            /tmp/php-server.log
            /tmp/nuxt-server.log
          retention-days: 7

  promote-production:
    name: Promote to production
    runs-on: ubuntu-latest
    needs: [playwright-full-sweep]
    environment: production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Deploy to production
        run: |
          if [ -f scripts/deploy.sh ]; then
            bash scripts/deploy.sh production
          else
            echo "::warning::scripts/deploy.sh not found — recording metadata only"
          fi

      - name: Record deployment metadata
        run: |
          mkdir -p build/deploy
          jq -n \
            --arg env "production" \
            --arg sha "${{ github.sha }}" \
            --arg ref "${{ github.ref }}" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg actor "${{ github.actor }}" \
            --arg run_id "${{ github.run_id }}" \
            '{environment: $env, sha: $sha, ref: $ref, timestamp: $ts, actor: $actor, run_id: $run_id}' \
            > build/deploy/production-metadata.json

      - name: Upload deployment metadata
        uses: actions/upload-artifact@v6
        with:
          name: production-deploy-metadata
          path: build/deploy/
          retention-days: 90

  post-deploy-smoke:
    name: Post-deploy smoke tests
    runs-on: ubuntu-latest
    needs: [promote-production]
    steps:
      - uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_sqlite, sqlite3, mbstring, xml
          coverage: none

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/admin/package-lock.json

      - name: Install dependencies and Playwright
        run: cd packages/admin && npm install --no-audit --no-fund && npx playwright install --with-deps chromium

      - name: Start PHP backend
        run: |
          php -S 127.0.0.1:8080 -t public/ > /tmp/php-server.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8080/ > /dev/null 2>&1 && break
            sleep 1
          done

      - name: Run post-deploy smoke tests
        run: cd packages/admin && npx playwright test --project=chromium

      - name: Upload smoke test artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: post-deploy-smoke
          path: |
            packages/admin/test-results/
            packages/admin/playwright-report/
          retention-days: 90

      - name: Attempt rollback on failure
        if: failure()
        run: |
          echo "::error::Post-deploy smoke tests FAILED"
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -n "$PREV_TAG" ] && [ -f scripts/rollback.sh ]; then
            echo "Rolling back to $PREV_TAG..."
            bash scripts/rollback.sh "$PREV_TAG"
          else
            echo "::error::Automatic rollback unavailable — manual intervention required"
          fi

      - name: Create incident issue on failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner, repo,
              title: `[INCIDENT] Post-deploy smoke failure — run ${context.runId}`,
              body: [
                '## Incident: Post-deploy smoke test failure',
                '',
                `| Field | Value |`,
                `|---|---|`,
                `| Commit | \`${context.sha}\` |`,
                `| Run | [${context.runId}](${runUrl}) |`,
                `| Actor | @${context.actor} |`,
                '',
                'Automatic rollback was attempted. Verify it succeeded.',
                '',
                '### Checklist',
                '- [ ] Verify rollback succeeded',
                '- [ ] Review Playwright artifacts',
                '- [ ] Root-cause the failure',
                '- [ ] Deploy fix',
              ].join('\n'),
              labels: ['incident', 'production'],
            });
