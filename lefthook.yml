pre-commit:
  parallel: true
  commands:
    php-cs:
      glob: "*.php"
      run: composer cs-fix

pre-push:
  parallel: true
  commands:
    spec-drift:
      run: tools/drift-detector.sh 5
    phpstan:
      glob: "*.php"
      run: composer phpstan
    phpunit:
      glob: "*.php"
      run: ./vendor/bin/phpunit --testsuite Unit --no-progress --display-warnings 2>&1 | grep -q "^OK"
